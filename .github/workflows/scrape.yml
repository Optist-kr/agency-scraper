name: Daily Project Scraper

on:
  workflow_dispatch:

jobs:
  scrape-and-notion:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 깃허브에 이미지를 저장할 권한
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        pip install playwright requests
        playwright install chromium

    - name: Run Scraper
      run: python scraper.py

    - name: Commit and Push Screenshots # 캡처한 이미지 파일을 깃허브에 올리기
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add screenshots/ data.json
        git commit -m "Add new project screenshots" || echo "No changes to commit"
        git push

    - name: Update Notion
      env:
        NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        GITHUB_REPOSITORY: ${{ github.repository }}
      run: python notion_updater.py
